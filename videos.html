<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>视频作品 | 我的资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-bar {
            margin-bottom: 2rem;
            text-align: left;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem 0;
            border-left: 4px solid #2563eb;
            padding-left: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-content {
            padding: 1rem;
        }
        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        video {
            width: 100%;
            background: #000;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.875rem;
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    <div class="section-title">🎬 视频作品</div>
    <div class="grid">
        <div class="card">
            <video controls preload="metadata">
                <source src="videos/demo.mp4" type="video/mp4">
                您的浏览器不支持 video 标签。
            </video>
            <div class="card-content">
                <h3>旅行记录</h3>
                <p>2026年西藏之旅剪辑片段。</p>
            </div>
        </div>
        <!-- 如果视频在B站/YouTube，可用iframe嵌入 -->
    </div>
    <footer>
        <p>© 2026 我的资源库 · 视频持续更新中</p>
    </footer>
</div>
</body>
</html>

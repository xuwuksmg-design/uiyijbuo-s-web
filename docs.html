<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>文档资料 | 我的资源库</title>
    <!-- KaTeX 支持 LaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
            onload="renderMathInElement(document.body, { 
                delimiters: [
                    {left: '\\[', right: '\\]', display: true},
                    {left: '\\(', right: '\\)', display: false}
                ]
            });"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-bar {
            margin-bottom: 2rem;
            text-align: left;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem 0;
            border-left: 4px solid #2563eb;
            padding-left: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-content {
            padding: 1rem;
        }
        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.875rem;
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    <div class="section-title">📄 文档资料</div>
    <div class="grid">
        <div class="card">
            <div class="card-content">
                <h3>项目说明书.pdf</h3>
                <p>详细的产品设计文档，共12页。包含公式 \( E = mc^2 \)。</p>
                <a href="docs/sample.pdf" target="_blank" class="btn">在线预览</a>
            </div>
        </div>
        <div class="card">
            <div class="card-content">
                <h3>数学笔记.pdf</h3>
                <p>积分公式示例：\[ \int_{0}^{\infty} e^{-x^2} dx = \frac{\sqrt{\pi}}{2} \]</p>
                <a href="docs/math_notes.pdf" target="_blank" class="btn">在线预览</a>
            </div>
        </div>
        <!-- 添加更多文档卡片 -->
    </div>
    <footer>
        <p>© 2026 我的资源库 · 文档持续更新中</p>
    </footer>
</div>

<!-- 检测 KaTeX 加载失败提示 -->
<script>
    window.addEventListener('load', function() {
        if (typeof renderMathInElement === 'undefined' || typeof katex === 'undefined') {
            var warning = document.createElement('div');
            warning.style.backgroundColor = '#ffebee';
            warning.style.color = '#c62828';
            warning.style.padding = '12px 16px';
            warning.style.margin = '16px auto';
            warning.style.borderRadius = '8px';
            warning.style.textAlign = 'center';
            warning.style.fontSize = '14px';
            warning.style.maxWidth = '600px';
            warning.innerHTML = '⚠️ 数学公式加载失败，请检查网络或尝试刷新页面。';
            var container = document.querySelector('.container');
            var nav = document.querySelector('.nav-bar');
            if (container && nav) {
                nav.insertAdjacentElement('afterend', warning);
            }
        }
    });
</script>
</body>
</html>

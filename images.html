<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>图片作品 | 我的资源库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-bar {
            margin-bottom: 2rem;
            text-align: left;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem 0;
            border-left: 4px solid #2563eb;
            padding-left: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-content {
            padding: 1rem;
        }
        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e2e8f0;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.875rem;
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    <div class="section-title">🖼️ 图片作品</div>
    <div class="grid">
        <div class="card">
            <img class="img-preview" src="images/photo1.jpg" alt="示例图片1">
            <div class="card-content">
                <h3>落日余晖</h3>
                <p>拍摄于2025年，自然风光系列。</p>
                <a href="images/photo1.jpg" target="_blank" class="btn">查看原图</a>
            </div>
        </div>
        <div class="card">
            <img class="img-preview" src="images/photo2.png" alt="示例图片2">
            <div class="card-content">
                <h3>城市夜景</h3>
                <p>长曝光作品，展示都市活力。</p>
                <a href="images/photo2.png" target="_blank" class="btn">查看原图</a>
            </div>
        </div>
        <!-- 在这里继续添加更多图片卡片，复制上面的结构即可 -->
    </div>
    <footer>
        <p>© 2026 我的资源库 · 图片持续更新中</p>
    </footer>
</div>
</body>
</html>

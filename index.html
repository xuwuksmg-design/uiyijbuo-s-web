<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>资源库 | 导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #475569;
            margin-bottom: 2rem;
        }
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }
        .btn {
            display: block;
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1.5rem;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
        }
        .btn-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .btn-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }
        .btn-desc {
            color: #64748b;
            font-size: 0.9rem;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }
            .btn {
                padding: 1rem;
            }
            .btn-icon {
                font-size: 2.5rem;
            }
            .btn-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 我的资源库</h1>
        <p class="subtitle">选择分类浏览</p>
        
        <div class="button-grid">
            <a href="images.html" class="btn">
                <span class="btn-icon">🖼️</span>
                <span class="btn-title">图片作品</span>
                <span class="btn-desc">摄影、设计、艺术图集</span>
            </a>
            <a href="docs.html" class="btn">
                <span class="btn-icon">📄</span>
                <span class="btn-title">文档资料</span>
                <span class="btn-desc">PDF、笔记、报告</span>
            </a>
            <a href="videos.html" class="btn">
                <span class="btn-icon">🎬</span>
                <span class="btn-title">视频作品</span>
                <span class="btn-desc">旅行记录、短片</span>
            </a>
        </div>
        
        <footer>
            <p>© 2026 我的资源库 · 内容持续更新</p>
            <p>🔒 受密码保护</p>
        </footer>
    </div>
</body>
</html>

</body>
</html>

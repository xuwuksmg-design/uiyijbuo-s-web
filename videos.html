<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配，支持全面屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>视频作品 | 我的资源库</title>
    <style>
        /* 全局重置：去掉默认边距，统一盒模型 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;      /* 柔和背景色，与其他页面一致 */
            color: #1e293b;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 顶部导航栏，返回首页 */
        .nav-bar {
            margin-bottom: 2rem;
            text-align: left;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        /* 章节标题，左侧蓝条装饰 */
        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem 0;
            border-left: 4px solid #2563eb;
            padding-left: 1rem;
        }
        /* 卡片网格：响应式布局，每行自动填充，卡片最小宽度 300px */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        /* 单个视频卡片 */
        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;           /* 圆角裁切视频边界 */
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .card-content {
            padding: 1rem;
        }
        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        /* 视频元素：占满卡片宽度，黑色背景作为占位 */
        video {
            width: 100%;
            background: #000;
        }
        /* 页脚样式 */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.875rem;
        }
        /* 移动端适配：网格变为单列，标题缩小 */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 返回首页的导航链接 -->
    <div class="nav-bar">
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
    <!-- 页面主标题 -->
    <div class="section-title">🎬 视频作品</div>
    <!-- 视频卡片网格 -->
    <div class="grid">
        <!-- 单个视频卡片示例，复制此结构添加更多视频 -->
        <div class="card">
            <!-- 
                video 标签：浏览器原生视频播放器
                controls 属性显示播放控件
                preload="metadata" 只预加载视频元数据（时长、尺寸等），节省流量
                source 的 src 指向视频文件路径，建议使用 .mp4 格式兼容性最好
            -->
            <video controls preload="metadata">
                <source src="videos/demo.mp4" type="video/mp4">
                您的浏览器不支持 video 标签。   <!-- 降级提示，在不支持 video 的浏览器中显示 -->
            </video>
            <div class="card-content">
                <h3>旅行记录</h3>
                <p>2026年西藏之旅剪辑片段。</p>
            </div>
        </div>
        <!-- 
            添加更多视频卡片：复制上面的 .card 结构，修改 video 的 src 路径、
            h3 标题和 p 描述即可。
            如果视频来自外部平台（如 B站、YouTube），可以用 iframe 嵌入，
            但需要注意跨域和平台限制。
        -->
    </div>
    <footer>
        <p>© 2026 我的资源库 · 视频持续更新中</p>
    </footer>
</div>
</body>
</html>
